[tools]
"github:tailwindlabs/tailwindcss" = "latest"
go = "1.26.0"

[tasks.templ]
description = "Regenerate Go code from .templ files"
run = "go tool templ generate"

[tasks.tailwind]
description = "Build Tailwind CSS into embedded static dir"
run = "tailwindcss -i static/input.css -o static/dist.css"

[tasks.format]
description = "Format .templ files"
run = "go tool templ fmt ."

[tasks.generate]
description = "Regenerate templ and tailwind (run before building the Go server)"
depends = ["templ", "tailwind", "format"]
run = ""

[tasks.build]
description = "Build the Go server binary"
depends = ["generate"]
run = "go build -o qwixx ."

[tasks.run]
description = "Run the Go server (builds assets first)"
depends = ["generate"]
run = "go run ."

[tasks.dev]
description = "Run templ and tailwind in watch mode with browser hot reload via proxy on :7331 (Ctrl+C stops all)"
run = """
trap 'kill 0; exit' INT TERM
go tool templ generate \
	-cmd "go run main.go" \
	-watch \
	-proxy http://127.0.0.1:3000 &
tailwindcss -i static/input.css -o static/dist.css --watch &
wait
"""
